name: Publish Java

# Publishes the Java package to Maven Central when a version tag is pushed.
# Requires repo secrets:
#   CENTRAL_USERNAME        - Central Portal user token name
#   CENTRAL_PASSWORD        - Central Portal user token secret
#   MAVEN_GPG_PRIVATE_KEY   - ASCII-armored GPG private key
#   MAVEN_GPG_PASSPHRASE    - passphrase for that key
# Namespace io.github.ankit-at must be verified in the Central Portal.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # allows manual "Run workflow" from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Deploy to Maven Central
        run: mvn --batch-mode --no-transfer-progress -P release -f java/pom.xml clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
